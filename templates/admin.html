<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Admin Panel | Topfaith University Result Checker</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white shadow-lg rounded-2xl p-8 w-full max-w-md">
      <h2 class="text-2xl font-bold text-center text-blue-600 mb-6">
        Reassessment Admin Panel
      </h2>

      {% if current_session %}
      <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-6">
        <p class="text-blue-800 font-medium" id="currentConfigText">Active: {{ current_session }} — {{ current_semester }} &mdash; &#8358;{{ '{:,}'.format(current_amount) }}/course</p>
      </div>
      {% else %}
      <div class="bg-gray-50 border border-gray-200 rounded-lg p-4 mb-6">
        <p class="text-gray-600" id="currentConfigText">No active period set</p>
      </div>
      {% endif %}

      <input type="hidden" id="adminKey" value="{{ admin_key }}">

      <form id="configForm" class="space-y-4">
        <div>
          <label for="session" class="block text-sm font-semibold text-gray-700 mb-2">
            Session
          </label>
          <select
            id="session"
            required
            class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
          >
            <option value="">Select Session</option>
            {% for s in sessions %}
            <option value="{{ s }}" {% if s == current_session %}selected{% endif %}>
              {{ s }}
            </option>
            {% endfor %}
          </select>
        </div>

        <div>
          <label for="semester" class="block text-sm font-semibold text-gray-700 mb-2">
            Semester
          </label>
          <select
            id="semester"
            required
            class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
          >
            <option value="">Select Semester</option>
            {% for sem in semesters %}
            <option value="{{ sem }}" {% if sem == current_semester %}selected{% endif %}>
              {{ sem }}
            </option>
            {% endfor %}
          </select>
        </div>

        <div>
          <label for="amountPerCourse" class="block text-sm font-semibold text-gray-700 mb-2">
            Amount per Course (&#8358;)
          </label>
          <input
            id="amountPerCourse"
            type="number"
            min="1"
            required
            value="{{ current_amount }}"
            class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
          />
        </div>

        <button
          id="saveBtn"
          type="submit"
          class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold hover:bg-blue-700"
        >
          Save Configuration
        </button>

        <div id="spinner" style="display: none" class="flex justify-center">
          <div class="loader"></div>
        </div>

        <div id="successMsg" class="hidden bg-green-50 border border-green-200 rounded-lg p-3 text-green-800 text-sm mt-4">
          Configuration saved successfully.
        </div>
        <div id="errorMsg" class="hidden bg-red-50 border border-red-200 rounded-lg p-3 text-red-800 text-sm mt-4"></div>

        <style>
          .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
          }

          @keyframes spin {
            0% {
              transform: rotate(0deg);
            }
            100% {
              transform: rotate(360deg);
            }
          }
        </style>
      </form>
    </div>

    <script>
      document
        .getElementById("configForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          const adminKey = document.getElementById("adminKey").value;
          const session = document.getElementById("session").value;
          const semester = document.getElementById("semester").value;
          const amountPerCourse = parseInt(document.getElementById("amountPerCourse").value, 10);
          const successMsg = document.getElementById("successMsg");
          const errorMsg = document.getElementById("errorMsg");
          const saveBtn = document.getElementById("saveBtn");
          const spinner = document.getElementById("spinner");

          if (!session || !semester) {
            showMessage("Please select both session and semester", "error");
            return;
          }
          if (!amountPerCourse || amountPerCourse <= 0) {
            showMessage("Please enter a valid amount greater than zero", "error");
            return;
          }

          saveBtn.disabled = true;
          spinner.style.display = "flex";

          const payload = {
            session: session,
            semester: semester,
            amount_per_course: amountPerCourse,
            key: adminKey,
          };

          const BASE_URL = window.location.origin;

          fetch(`${BASE_URL}/admin/set-config/`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(payload),
          })
            .then((response) => response.json())
            .then((data) => {
              spinner.style.display = "none";
              saveBtn.disabled = false;
              if (data.status) {
                successMsg.classList.remove("hidden");
                errorMsg.classList.add("hidden");
                const currentConfigText = document.getElementById("currentConfigText");
                currentConfigText.textContent = "Active: " + session + " — " + semester + " — ₦" + amountPerCourse.toLocaleString() + "/course";
                setTimeout(() => {
                  successMsg.classList.add("hidden");
                }, 3000);
              } else {
                errorMsg.textContent = "Error saving configuration";
                errorMsg.classList.remove("hidden");
                successMsg.classList.add("hidden");
                setTimeout(() => {
                  errorMsg.classList.add("hidden");
                }, 3000);
              }
            })
            .catch((error) => {
              spinner.style.display = "none";
              saveBtn.disabled = false;
              console.error("Error:", error);
              errorMsg.textContent = "An error occurred";
              errorMsg.classList.remove("hidden");
              successMsg.classList.add("hidden");
              setTimeout(() => {
                errorMsg.classList.add("hidden");
              }, 3000);
            });
        });

      function showMessage(text, type) {
        const successMsg = document.getElementById("successMsg");
        const errorMsg = document.getElementById("errorMsg");

        if (type === "success") {
          successMsg.classList.remove("hidden");
          errorMsg.classList.add("hidden");
        } else {
          errorMsg.textContent = text;
          errorMsg.classList.remove("hidden");
          successMsg.classList.add("hidden");
        }

        setTimeout(() => {
          successMsg.classList.add("hidden");
          errorMsg.classList.add("hidden");
        }, 3000);
      }
    </script>
  </body>
</html>
