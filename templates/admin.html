<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Admin Panel | Topfaith University Result Checker</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white shadow-lg rounded-2xl p-8 w-full max-w-md">
      <h2 class="text-2xl font-bold text-center text-blue-600 mb-6">
        Admin Configuration
      </h2>

      <form id="configForm" class="space-y-4">
        <div>
          <label for="session" class="block text-sm font-semibold text-gray-700 mb-2">
            Session
          </label>
          <select
            id="session"
            required
            class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
          >
            <option value="">Select Session</option>
            {% for s in sessions %}
            <option value="{{ s }}" {% if s == current_session %}selected{% endif %}>
              {{ s }}
            </option>
            {% endfor %}
          </select>
        </div>

        <div>
          <label for="semester" class="block text-sm font-semibold text-gray-700 mb-2">
            Semester
          </label>
          <select
            id="semester"
            required
            class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
          >
            <option value="">Select Semester</option>
            {% for sem in semesters %}
            <option value="{{ sem }}" {% if sem == current_semester %}selected{% endif %}>
              {{ sem }}
            </option>
            {% endfor %}
          </select>
        </div>

        <button
          type="submit"
          class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold hover:bg-blue-700"
        >
          Save Configuration
        </button>

        <div id="spinner" style="display: none" class="flex justify-center">
          <div class="loader"></div>
        </div>

        <div id="message" class="hidden rounded-lg p-3 text-center text-sm font-semibold"></div>

        <style>
          .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
          }

          @keyframes spin {
            0% {
              transform: rotate(0deg);
            }
            100% {
              transform: rotate(360deg);
            }
          }
        </style>
      </form>
    </div>

    <script>
      const adminKey = "{{ admin_key }}";

      document
        .getElementById("configForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          const session = document.getElementById("session").value;
          const semester = document.getElementById("semester").value;
          const messageDiv = document.getElementById("message");
          const spinner = document.getElementById("spinner");

          if (!session || !semester) {
            showMessage("Please select both session and semester", "error");
            return;
          }

          spinner.style.display = "flex";

          const payload = {
            session: session,
            semester: semester,
            key: adminKey,
          };

          const BASE_URL = window.location.origin;

          fetch(`${BASE_URL}/admin/set-config/`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(payload),
          })
            .then((response) => response.json())
            .then((data) => {
              spinner.style.display = "none";
              if (data.status) {
                showMessage("Configuration saved successfully", "success");
              } else {
                showMessage("Error saving configuration", "error");
              }
            })
            .catch((error) => {
              spinner.style.display = "none";
              console.error("Error:", error);
              showMessage("An error occurred", "error");
            });
        });

      function showMessage(text, type) {
        const messageDiv = document.getElementById("message");
        messageDiv.textContent = text;
        messageDiv.classList.remove("hidden");

        if (type === "success") {
          messageDiv.classList.remove("bg-red-100", "text-red-700");
          messageDiv.classList.add("bg-green-100", "text-green-700");
        } else {
          messageDiv.classList.remove("bg-green-100", "text-green-700");
          messageDiv.classList.add("bg-red-100", "text-red-700");
        }

        setTimeout(() => {
          messageDiv.classList.add("hidden");
        }, 3000);
      }
    </script>
  </body>
</html>
